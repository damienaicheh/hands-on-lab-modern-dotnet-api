name: Build Starter Lab

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-starter:
    name: Generate starter lab
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore LabGen
        run: dotnet restore tools/LabGen/LabGen.csproj

      - name: Generate lab 1
        run: dotnet run --project tools/LabGen -- generate --lab 1

      - name: Rename generated lab to starter
        run: |
          rm -rf generated/labs/starter
          mv generated/labs/1 generated/labs/starter

      - name: Zip starter lab
        run: |
          cd generated/labs
          zip -r starter.zip starter

      - name: Setup ORAS
        uses: oras-project/setup-oras@v1

      - name: Login to GitHub Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Publish starter package
        run: |
          package_ref="ghcr.io/${GITHUB_REPOSITORY,,}/starter"

          oras push "${package_ref}:latest" \
            --artifact-type application/vnd.documentapi.starter-lab.v1+zip \
            --annotation "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --annotation "org.opencontainers.image.description=Starter lab generated from lab 1" \
            generated/labs/starter.zip:application/zip

          oras tag "${package_ref}:latest" "${GITHUB_SHA}"
