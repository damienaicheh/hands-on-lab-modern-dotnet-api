name: Build Starter Lab

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-starter:
    name: Generate starter lab
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore LabGen
        run: dotnet restore tools/LabGen/LabGen.csproj

      - name: Generate lab 1
        run: dotnet run --project tools/LabGen -- generate --lab 1

      - name: Rename generated lab to starter
        run: |
          rm -rf generated/labs/starter
          mv generated/labs/1 generated/labs/starter

      - name: Zip starter lab
        run: |
          cd generated/labs
          zip -r starter.zip starter

      - name: Publish starter release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="starter-latest"

          gh release create "${tag}" generated/labs/starter.zip \
            --target "${GITHUB_SHA}" \
            --title "Starter Lab" \
            --notes "Starter lab generated from lab 1 for commit ${GITHUB_SHA}." \
            --latest
